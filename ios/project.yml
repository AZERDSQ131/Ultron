name: ULTRON
options:
  bundleIdPrefix: com.ultron
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ULTRON:
    type: application
    platform: iOS
    sources:
      - path: ULTRON
    info:
      path: ULTRON/Resources/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ultron.mobile
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
