<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ULTRON — Health</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body.health-page {
      display: block;
      overflow-y: auto;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      padding: 24px;
    }
    .health-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; }
    .health-header a { color: var(--text-dim); text-decoration: none; font-size: var(--fs-sm); }
    .health-header h1 { font-size: var(--fs-lg); margin: 0; }
    .health-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }
    .card {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 16px;
    }
    .card h2 { font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin: 0 0 10px; }
    .stat-big { font-size: 32px; font-weight: 600; font-family: var(--mono); }
    .stat-sub { color: var(--text-dim); font-size: var(--fs-sm); margin-top: 4px; }
    .anomaly-line { color: var(--warn); font-size: var(--fs-sm); margin-top: 8px; }
    .chart-card { grid-column: span 2; }
    svg { width: 100%; height: 120px; display: block; }
    .empty-hint { color: var(--text-dim); padding: 40px; text-align: center; }
    .gauge-wrap { display: flex; align-items: center; gap: 16px; }
    .records-list { list-style: none; margin: 0; padding: 0; font-size: var(--fs-sm); color: var(--text-dim); }
    .records-list li { padding: 3px 0; }
    .records-list strong { color: var(--text); }
  </style>
</head>
<body class="health-page">
  <div class="health-header">
    <a href="/">&larr; ULTRON</a>
    <h1>Health</h1>
  </div>
  <div id="health-root">
    <div class="empty-hint">Loading…</div>
  </div>
  <script type="module" src="/js/health.js"></script>
</body>
</html>
